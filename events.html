<!-- Events page for 'Til the Cows Come Home - Flowers and More--->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet">

    <title>Pawsome Arts and Crafts</title>

    <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet'>
    <style>
        body {
            font-family: 'Pacifico';
        }
    </style>
</head>
<body class="site">
  <div class="container-fluid">
    <div id="navbar"></div>
  </div>
  <main class="site-content py-2">
    <br>
     <div class="flex-container justify-content-center">
        <div class="row">
            <div class="col-sm-6 col-sm-6 col-12 mb-3">
                <div class="card gallery-card">
                    <div class="embed-responsive-1by1">
                        <img alt="Millard West Baseball Craft Fair"
                             class="gallery-img"
                             src="img/events/MW%20Image.jpg"/>
                        <div class="image-text">
                            MWHS Spring Craft Fair - March 14, 2026
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-sm-6 col-sm-6 col-12 mb-3">
                <div class="card gallery-card">
                    <div class="embed-responsive-1by1">
                        <img alt="Look for our booth!"
                             class="gallery-img" src="img/events/booth.jpg"/>
                        <div class="image-text">Look for our booth!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div id="footer"></div>
<script>
  fetch("footer.html")
    .then(r => r.text())
    .then(html => {
      document.getElementById("footer").innerHTML = html;

      const current = (location.pathname.split("/").pop() || "index.html")
        .split("?")[0].split("#")[0];

      document.querySelectorAll("#footer a.foot-link").forEach(a => {
        const href = (a.getAttribute("href") || "").split("?")[0].split("#")[0];
        if (href === current) a.classList.add("active");
      });
    });
  fetch("navbar.html")
    .then(r => r.text())
    .then(html => {
      document.getElementById("navbar").innerHTML = html;

      // current file name (no query/hash)
      const current = (location.pathname.split("/").pop() || "index.html")
        .split("?")[0].split("#")[0];

      document.querySelectorAll("#navbar a.nav-page").forEach(a => {
        const href = (a.getAttribute("href") || "").split("?")[0].split("#")[0];

        if (href === current) {
          a.classList.add("active");
          a.setAttribute("aria-current", "page");

          const li = a.closest(".nav-item");
          if (li) li.classList.add("active");
        }
      });
    });
</script>
</body>

</html>
