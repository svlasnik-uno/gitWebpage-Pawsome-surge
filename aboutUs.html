<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet">

    <title>Pawsome Arts and Crafts</title>

    <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet'>
    <style>
        body {
            font-family: 'Pacifico';
        }
    </style>
</head>
<body class="site">
<div class="container-fluid">
    <div id="navbar"></div>
</div>

<main class="site-content py-2">
    <div class="container about-container">
        <div class="card text-center mx-auto" style="max-width: 700px;">
            <div class="card-header">
                About Us
            </div>
            <div class="card gallery-card">
                <p class="card-text">
                    We create custom, long-lasting sola wood flower arrangements, hand-crocheted items, and other arts
                    and
                    crafts.<br>
                    <br>
                    We love animals, and 10% of all net sales are donated to
                    <br>
                    <a href="https://townandcountryanimalrescue.org/">
                        <img src="img/tacar-logo.jpg" width="30" height="30">Town and Country Animal Rescue</a>
                    <br>We hope you love our designs as much as we do!
                </p>
                <p class="card3-img-top">
                    <img alt="Pawsome arts and crafts logo" class="card-img-top embed-responsive-item"
                         src="img/logo.png"/>
                </p>
            </div>
            <br>
        </div>
    </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    fetch("footer.html")
        .then(r => r.text())
        .then(html => {
            document.getElementById("footer").innerHTML = html;

            const current = (location.pathname.split("/").pop() || "index.html")
                .split("?")[0].split("#")[0];

            document.querySelectorAll("#footer a.foot-link").forEach(a => {
                const href = (a.getAttribute("href") || "").split("?")[0].split("#")[0];
                if (href === current) a.classList.add("active");
            });
        });
    fetch("navbar.html")
        .then(r => r.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;

            // current file name (no query/hash)
            const current = (location.pathname.split("/").pop() || "index.html")
                .split("?")[0].split("#")[0];

            document.querySelectorAll("#navbar a.nav-page").forEach(a => {
                const href = (a.getAttribute("href") || "").split("?")[0].split("#")[0];

                if (href === current) {
                    a.classList.add("active");
                    a.setAttribute("aria-current", "page");

                    const li = a.closest(".nav-item");
                    if (li) li.classList.add("active");
                }
            });
        });
</script>
</body>

</html>
